@if (game$ | async; as game) {
<article>
  <h2>{{ game.title }}</h2>

  <dl>
    <dt>Release year</dt>
    <dd>{{ game.originalReleaseYear }}</dd>

    <dt>Developers</dt>
    <dd>{{ game.developers.join(', ') }}</dd>

    <dt>Publishers</dt>
    <dd>{{ game.publishers.join(', ') }}</dd>

    <dt>Genres</dt>
    <dd>{{ game.genres.join(', ') }}</dd>

    <dt>Tags</dt>
    <dd>{{ game.tags.join(', ') }}</dd>
  </dl>
</article>
} @else {
<p>Game not found.</p>
}
