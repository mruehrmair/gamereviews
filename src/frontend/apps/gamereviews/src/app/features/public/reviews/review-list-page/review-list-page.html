<h2>Reviews</h2>

@if (reviews$ | async; as reviews) {
<table>
  <thead>
    <tr>
      <th scope="col">Title</th>
      <th scope="col">Game</th>
      <th scope="col">Rating</th>
      <th scope="col">Status</th>
      <th scope="col">Updated</th>
    </tr>
  </thead>
  <tbody>
    @for (review of reviews; track review.id) {
    <tr>
      <td>
        <a [routerLink]="['/reviews', review.slug]">{{ review.title }}</a>
      </td>
      <td>{{ review.gameId }}</td>
      <td>{{ review.rating }}</td>
      <td>{{ review.status }}</td>
      <td>{{ review.updatedAt }}</td>
    </tr>
    } @empty {
    <tr>
      <td colspan="5">No reviews available.</td>
    </tr>
    }
  </tbody>
</table>
}
